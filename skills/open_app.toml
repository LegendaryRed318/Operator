# Open App - Application launcher
[skill]
name = "open_app"
trigger = "open"
aliases = ["launch", "start"]
trigger_mode = "contains"
description = "Launch applications by name"
priority = 50
enabled = true
requires_online = false
cooldown_seconds = 10
timeout_seconds = 5

[action]
type = "open_application"
response = "Opening {app_name}, sir."
